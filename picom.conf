shadow = true;
shadow-radius = 13;
shadow-opacity = .60
shadow-offset-x = -13;
shadow-offset-y = -15;
shadow-color = "#000000"
fading = true;
fade-in-step = .15;
fade-out-step = .15;
fade-delta = 5;
no-fading-openclose = false;
no-fading-destroyed-argb = false;
frame-opacity = 1;
inactive-dim-fixed = false;
corner-radius = 0;
blur-background = false;
blur-background-frame = false
blur-kern = "5x5gaussian";
dbus = false;
daemon = false;
backend = "xrender";
vsync = true; #
detect-rounded-corners = false;
detect-client-opacity = true; #
use-ewmh-active-win = false;
unredir-if-possible = false;
detect-transient = true; #
use-damage = true; #
force-win-blend = true;
no-ewmh-fullscreen = false;
max-brightness = 1;
transparent-clipping = false;

rules: (
    {
        match = "window_type = 'tooltip'";
        fade = false;
        shadow = false;
        opacity = 1;
        full-shadow = false;
    },
    {
        match = "class_g = 'Dunst'";
        shadow = false;
        opacity = 1;
    },
    {
        match = "class_g = 'Alacritty'";
        opacity = 1;
    },
    {
        match = "window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'menu'";
        opacity = 1;
        shadow = false;
    },
    {
        match = "class_g = 'i3bar'";
        opacity = 1;
        shadow = true;
    },
    {
        match = "class_g = 'Rofi'";
        opacity = 1;
        transparent-clipping = false;
    },
    {
        match = "_NET_WM_STATE@[*] = '_NET_WM_STATE_MAXIMIZED_HORZ' && _NET_WM_STATE@[*] = '_NET_WM_STATE_MAXIMIZED_VERT'";
        shadow = false;
    }
)
