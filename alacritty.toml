[general]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = false

[cursor.style]
blinking = "Always"
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.bold]
family = "Agave Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Agave Nerd Font"
style = "Bold"

[font.italic]
family = "Agave Nerd Font"
style = "Regular"

[font.normal]
family = "Agave Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[mouse]
hide_when_typing = true

[scrolling]
history = 500
multiplier = 3

[selection]
save_to_clipboard = true

[window]
dynamic_padding = false

[window.padding]
x = 10
y = 10


# Default colors
[colors.primary]
background = '0x282a36'
foreground = '0xf8f8f2'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282a36'
cursor = '0xf8f8f2'

# Normal colors
[colors.normal]
black = '0x282a36'
red = '0xff5555'
green = '0x50fa7b'
yellow = '0xf1fa8c'
blue = '0xbd93f9'
magenta = '0xff79c6'
cyan = '0x8be9fd'
white = '0xf8f8f2'

# Bright colors
[colors.bright]
black = '0x6272a4'
red = '0xff5555'
green = '0x50fa7b'
yellow = '0xf1fa8c'
blue = '0xbd93f9'
magenta = '0xff79c6'
cyan = '0x8be9fd'
white = '0xffffff'

[[colors.indexed_colors]]
index = 16
color = "0xffb86c"

[[colors.indexed_colors]]
index = 17
color = "0x993333"

[[colors.indexed_colors]]
index = 18
color = "0x21222c"

[[colors.indexed_colors]]
index = 19
color = "0x44475a"

[[colors.indexed_colors]]
index = 20
color = "0x9ea8c7"

[[colors.indexed_colors]]
index = 21
color = "0xf8f8f2"
