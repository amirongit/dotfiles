[general]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = false

[cursor.style]
blinking = "Always"
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 13

[font.bold]
family = "Ubuntu Mono"
style = "Regular"

[font.bold_italic]
family = "Ubuntu Mono"
style = "Regular"

[font.italic]
family = "Ubuntu Mono"
style = "Regular"

[font.normal]
family = "Ubuntu Mono"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[mouse]
hide_when_typing = true

[scrolling]
history = 500
multiplier = 3

[selection]
save_to_clipboard = true

[window]
dynamic_padding = false

[window.padding]
x = 10
y = 10


# https://github.com/tinted-theming/tinted-terminal/tree/main/themes/alacritty


# Default colors
[colors.primary]
background = '0x181616'
foreground = '0xc5c9c5'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x181616'
cursor = '0xc5c9c5'

# Normal colors
[colors.normal]
black = '0x181616'
red = '0xc4746e'
green = '0x8a9a7b'
yellow = '0xc4b28a'
blue = '0x8ba4b0'
magenta = '0xa292a3'
cyan = '0x8ea4a2'
white = '0xc5c9c5'

# Bright colors
[colors.bright]
black = '0x625e5a'
red = '0xc4746e'
green = '0x8a9a7b'
yellow = '0xc4b28a'
blue = '0x8ba4b0'
magenta = '0xa292a3'
cyan = '0x8ea4a2'
white = '0xc5c9c5'

[[colors.indexed_colors]]
index = 16
color = "0xb6927b"

[[colors.indexed_colors]]
index = 17
color = "0xb98d7b"

[[colors.indexed_colors]]
index = 18
color = "0x282727"

[[colors.indexed_colors]]
index = 19
color = "0x393836"

[[colors.indexed_colors]]
index = 20
color = "0x737c73"

[[colors.indexed_colors]]
