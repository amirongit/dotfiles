[general]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = false

[cursor.style]
blinking = "Always"
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 10

[font.bold]
family = "Agave Nerd Font Propo"
style = "Regular"

[font.bold_italic]
family = "Agave Nerd Font Propo"
style = "Regular"

[font.italic]
family = "Agave Nerd Font Propo"
style = "Regular"

[font.normal]
family = "Agave Nerd Font Propo"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[mouse]
hide_when_typing = true

[scrolling]
history = 500
multiplier = 3

[selection]
save_to_clipboard = true

[window]
dynamic_padding = false

[window.padding]
x = 10
y = 10


# https://github.com/tinted-theming/tinted-terminal/tree/main/themes/alacritty


# Default colors
[colors.primary]
background = '0x282c34'
foreground = '0xd5c4a1'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282c34'
cursor = '0xfdf4c1'

# Normal colors
[colors.normal]
black = '0x2c323b'
red = '0x83a598'
green = '0x528b8b'
yellow = '0xa07e3b'
blue = '0x83a598'
magenta = '0xd75f5f'
cyan = '0x83a598'
white = '0xd5c4a1'

# Bright colors
[colors.bright]
black = '0x3e4451'
red = '0x83a598'
green = '0x528b8b'
yellow = '0xa07e3b'
blue = '0x83a598'
magenta = '0xd75f5f'
cyan = '0x83a598'
white = '0xfdf4c1'

