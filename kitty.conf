font_family      family='Google Sans Code Proportional' style='SemiBold'
bold_font        family='Google Sans Code Proportional' style='SemiBold'
italic_font      family='Google Sans Code Proportional' style='SemiBold'
bold_italic_font family='Google Sans Code Proportional' style='SemiBold'

font_size 11
force_ltr no
disable_ligatures never
text_composition_strategy legacy

cursor_shape block
shell_integration no-cursor
cursor_blink_interval 1
cursor_stop_blinking_after 0
cursor_trail 1
# cursor_trail_decay 0.4 0.4
# cursor_trail_start_threshold 2

scrollback_lines 10000

mouse_hide_wait -1
url_style none
detect_urls no
copy_on_select clipboard
# paste_actions none
strip_trailing_spaces smart

enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell no
bell_on_tab ""
command_on_bell none
bell_path none

remember_window_size  no
initial_window_width  640
initial_window_height 400

window_padding_width 5
placement_strategy center
confirm_os_window_close 0
# background_opacity 0.8
# background_blur 64

shell .
editor nvim
close_on_child_death no
allow_remote_control no
update_check_interval 0
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
# term xterm-256color

# The basic colors
background #181818
foreground #d8d8d8
selection_background #d8d8d8
selection_foreground #383838

# Cursor colors
cursor #d8d8d8
cursor_text_color #181818

# URL underline color when hovering with mouse
url_color #b8b8b8

# Kitty window border colors
active_border_color #585858
inactive_border_color #282828

# OS Window titlebar colors
wayland_titlebar_color #181818
macos_titlebar_color #181818

# Tab bar colors
active_tab_background #181818
active_tab_foreground #d8d8d8
inactive_tab_background #282828
inactive_tab_foreground #b8b8b8
tab_bar_background #282828

